# Production stack for fund-dashboard.
#
# Co-tenant of nofx on the same VPS (host/IP live in deploy/deploy.env, not
# here). The co-tenancy contract preserved per memory project_nofx_vps_cotenancy:
#
#   * cpus=0.5, mem_limit=512M   — dashboard cannot starve nofx
#   * port :8090                  — separate from nofx :8080
#   * own docker network          — no shared compose, no shared net ns
#   * persistent fund.db          — bind mount at ./data
#   * read .env (gitignored)      — JWT_SECRET, BINANCE_API_KEY/SECRET,
#                                   COOKIE_SECURE=true (Cloudflare HTTPS edge)
#
# Deploy from project root on VPS:
#
#   cd /root/stacks/dashboard
#   docker compose up -d --build
#
# Inspect:
#
#   docker compose logs -f dashboard
#   docker compose exec dashboard dashctl status

services:
  dashboard:
    build:
      context: .
      # Thin COPY-only image — artifacts are built on the dev Mac by
      # deploy.sh. Never run the full Dockerfile build on this 1.6GB box.
      dockerfile: Dockerfile.runtime
    container_name: fund-dashboard
    restart: unless-stopped
    ports:
      # Bind to loopback ONLY. host nginx (:8443) reverse-proxies to
      # 127.0.0.1:8090; the origin must never be reachable directly from the
      # public internet (that would bypass Cloudflare's TLS/WAF and serve the
      # API over plaintext). Docker's port publishing sidesteps ufw, so the
      # 127.0.0.1 prefix — not a host firewall rule — is what actually closes it.
      - "127.0.0.1:8090:8090"
    env_file:
      - .env
    environment:
      COOKIE_SECURE: "true"
      # The only ingress is the host nginx above, which overwrites X-Real-IP
      # with the real peer, so the app may trust that header for rate-limiting.
      TRUST_PROXY_HEADERS: "true"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
