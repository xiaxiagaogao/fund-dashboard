# nginx vhost for fund.xg22.top — same pattern as the existing trade.xg22.top
# vhost on this host: listen :8443 ssl http2, Cloudflare proxies → origin :8443
# (custom origin port configured at the Cloudflare zone for *.xg22.top).
#
# Install (on VPS host nginx, NOT inside any container):
#
#   # 1. Self-signed cert (Cloudflare in "Full" SSL mode accepts self-signed):
#   openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
#       -subj "/CN=fund.xg22.top" \
#       -keyout /etc/nginx/ssl/fund.xg22.top.key \
#       -out    /etc/nginx/ssl/fund.xg22.top.crt
#   chmod 600 /etc/nginx/ssl/fund.xg22.top.key
#
#   # 2. Place vhost (same dir as trade.xg22.top):
#   cp fund.xg22.top.conf /etc/nginx/sites-enabled/fund.xg22.top
#
#   # 3. Test + reload:
#   nginx -t && nginx -s reload

# HTTP -> HTTPS redirect (parity with trade vhost; also stops CF "Always Use
# HTTPS" loops when CF probes :80).
server {
    listen 80;
    listen [::]:80;
    server_name fund.xg22.top;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name fund.xg22.top;

    ssl_certificate     /etc/nginx/ssl/fund.xg22.top.crt;
    ssl_certificate_key /etc/nginx/ssl/fund.xg22.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 1m;

    # All traffic goes to the dashboard container — Go server splits /api/*
    # vs SPA static internally.
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    access_log /var/log/nginx/fund.xg22.top.access.log;
    error_log  /var/log/nginx/fund.xg22.top.error.log warn;
}
